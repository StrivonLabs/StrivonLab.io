<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Strivon Platform</title>
    <link rel="stylesheet" href="style.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <h1>Strivon</h1>
    </nav>

    <section class="hero">
        <h2>Build. Adapt. Dominate.</h2>
        <p>A modular workflow platform for everything.</p>
    </section>

    <div class="filters">
        <button onclick="filter('all')"><i class="fas fa-layer-group"></i> All</button>
        <button onclick="filter('gaming')"><i class="fas fa-gamepad"></i> Gaming</button>
        <button onclick="filter('tools')"><i class="fas fa-wrench"></i> Tools</button>
        <button onclick="filter('scripts')"><i class="fas fa-code"></i> Scripts</button>
        <button onclick="filter('dev')"><i class="fas fa-laptop-code"></i> Dev</button>
        <button onclick="filter('ai')"><i class="fas fa-robot"></i> AI</button>
        <button onclick="filter('productivity')"><i class="fas fa-bolt"></i> Productivity</button>
        <button onclick="filter('education')"><i class="fas fa-book"></i> Education</button>
    </div>

    <section class="grid" id="content"></section>

    <script src="app.js"></script>
</body>
</html>
