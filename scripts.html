<!DOCTYPE html>
<html>
<head>
<title>Script Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Script Hub</h1>

<div class="grid">

  <div class="card">
    <h3>Lua Basics</h3>
    <pre>
print("Hello World")
    </pre>
  </div>

  <div class="card">
    <h3>Loop Example</h3>

while true do
  print("Running")

end

  <div class="card">
    <h3>Simple Function</h3>

function greet(name)
  print("Hello "..name)
end

greet("Strivon")

  </div>

</div>
